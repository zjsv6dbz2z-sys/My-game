<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機甲風暴 MUD Ultimate v3.5</title>
    <style>
        :root {
            /* 286 經典綠磷光 */
            --neon-green: #33ff33;
            --neon-glow: rgba(51, 255, 51, 0.2);
            --dark-bg: #020502;
            --panel-bg: #050a05;
            --danger-red: #ff2222;
            --amber: #ffaa00;
        }

        body {
            background-color: var(--dark-bg);
            /* 286 CRT 螢幕中心微光暈效果，完全不用圖片 */
            background-image: radial-gradient(circle, #0c200c 0%, #020502 80%);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 286 螢幕慢速掃描線與低頻閃爍效果 */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 999;
            background-size: 100% 3px;
            pointer-events: none;
            opacity: 0.8;
        }

        /* 模擬老舊硬體的微幅畫面閃爍 */
        .crt-flicker {
            animation: crt-flicker-anim 0.15s infinite;
        }
        @keyframes crt-flicker-anim {
            0% { opacity: 0.99; }
            50% { opacity: 0.97; }
            100% { opacity: 0.99; }
        }

        .game-container {
            width: 100%;
            max-width: 550px;
            background: rgba(5, 10, 5, 0.9);
            border: 2px solid var(--neon-green);
            box-shadow: inset 0 0 15px rgba(51, 255, 51, 0.3), 0 0 20px var(--neon-glow);
            padding: 12px;
            box-sizing: border-box;
            border-radius: 6px;
            position: relative;
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 6px;
            margin-bottom: 10px;
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* 286 綠單色雷達 */
        .viewport {
            width: 100%;
            height: 140px;
            background-color: #010301;
            border: 1px solid var(--neon-green);
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .radar-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(51, 255, 51, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 255, 51, 0.08) 1px, transparent 1px);
            background-size: 15px 15px;
            background-position: center;
        }

        .radar-sweep {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%; left: -50%;
            background: conic-gradient(from 0deg, rgba(51, 255, 51, 0.12) 0deg, transparent 90deg);
            animation: sweep 6s linear infinite;
            transform-origin: center;
            pointer-events: none;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }

        /* 終端顯示主螢幕 */
        .story-screen {
            height: 240px;
            background: #010201;
            border: 1px solid rgba(51, 255, 51, 0.4);
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(51, 255, 51, 0.2);
        }

        .story-text {
            margin-bottom: 12px;
            white-space: pre-wrap;
            text-shadow: 0 0 2px var(--neon-green);
        }

        /* 狀態監控面板 */
        .status-panel {
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            border: 1px dashed rgba(51, 255, 51, 0.4);
            padding: 8px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 15px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 2px var(--neon-green);
        }

        /* 控制按鈕 */
        .option-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .option-btn {
            background: #020502;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            text-shadow: 0 0 2px var(--neon-green);
        }

        .option-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
            text-shadow: none;
        }

        .blink { animation: blinkAnim 1.8s infinite; }
        @keyframes blinkAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="crt-flicker">

<div class="game-container">
    <div class="screen-header">
        <span>[HEPHAESTUS 286-XT TERMINAL]</span>
        <span class="blink" style="color: var(--amber);">● ONLINE</span>
    </div>

    <!-- 雷達視窗 -->
    <div class="viewport">
        <div class="radar-grid"></div>
        <div class="radar-sweep"></div>
        <div style="position: absolute; top: 10px; left: 10px; font-size: 10px; color: rgba(51,255,51,0.5);">GRID: CENTRAL-SCAR</div>
    </div>

    <!-- 儀表狀態 -->
    <div class="status-panel" id="status-panel" style="display: none;">
        <div class="status-item"><span>PILOT:</span><span id="p-name">--</span></div>
        <div class="status-item"><span>MECHA:</span><span id="p-mecha">--</span></div>
        <div class="status-item"><span>CREDITS:</span><span id="p-cash" style="color:var(--amber);">0</span></div>
        <div class="status-item"><span>AMMO:</span><span id="p-ammo">--</span></div>
        <div class="status-item"><span>ENERGY:</span><span id="p-energy">--</span></div>
        <div class="status-item"><span>REPUTATION:</span><span id="p-rep">--</span></div>
    </div>

    <!-- 主劇情/文本輸出 -->
    <div class="story-screen" id="story-screen">
        <div class="story-text" id="story-content">>>> [286-BOOT SEQUENCE SUCCESSFUL]
RAM CHECK: 640KB OK
DISPLAY ADAPTER: MDA MONOCHROME ACTIVE

歡迎來到赫菲斯托斯。這是一顆表面完全被鐵鏽覆蓋的荒蕪星球。
在踏上這條鋼鐵與鮮血鋪成的道路前，請先載入你的**出身設定**。</div>
    </div>

    <!-- 交互選項 -->
    <div class="option-container" id="options-box"></div>
</div>

<script>
    // 遊戲資料
    const origins = {
        "FA": { name: "聯邦A：天梯退學生", mecha: "隼訓練型", cash: 12000, desc: "速度+15%、裝甲-10%。擁有空感學院人脈，但沙塵環境下機體故障率+10%，無法接取帝國基礎任務。" },
        "FB": { name: "聯邦B：企業子弟", mecha: "稜鏡青年版", cash: 15000, desc: "索敵+15%、火力-5%。具備高階神經親和與上流口音，但裝甲成長緩慢，西方帝國物價提升 20%。" },
        "FC": { name: "聯邦C：移民二代", mecha: "鴿子改裝型", cash: 8000, desc: "屬性平均，經驗獲取+5%。機體改造續航+30%，處事圓滑，無致命劣勢，推薦新手。" },
        "DA": { name: "帝國A：礦坑之子", mecha: "蠍尾礦山型", cash: 5000, desc: "裝甲+15%、速度-10%。具備「礦工之肺」免疫沙暴惡劣氣候，且耐過熱能力極佳，推薦新手。" },
        "DB": { name: "帝國B：士官家族", mecha: "工兵帝國型", cash: 7000, desc: "火力+10%、裝甲+5%、索敵-10%、速度-5%。每月可獲得軍部 500 補貼，擁有極強的戰術直覺。" },
        "DC": { name: "帝國C：邊境逃兵", mecha: "鼠改裝型", cash: 3000, desc: "速度+10%、索敵+5%、裝甲-10%。隱蔽性+20%，死後能保留 50% 資產，但目前處於帝國通緝狀態。" },
        "NA": { name: "中立A：拾荒兒", mecha: "街犬型", cash: 4000, desc: "索敵+10%、速度+5%、火力-10%。在黑市交易享有 20% 折扣，更容易取得罕見黑市情報。" },
        "NB": { name: "中立B：契約之子", mecha: "赤鳶標準型", cash: 10000, desc: "全屬性平衡。起始公會聲望+20，所有委託任務基礎報酬額外提升 10%，最易上手。" }
    };

    let player = {
        name: "",
        origin: null,
        mecha: "",
        cash: 0,
        ammo: "充足",
        energy: "滿載",
        rep: "鋼鐵契約: 10",
        step: "select_origin"
    };

    function writeStory(text, append=false) {
        const screen = document.getElementById('story-content');
        if (append) {
            screen.innerHTML += "\n\n" + text;
        } else {
            screen.innerHTML = text;
        }
        document.getElementById('story-screen').scrollTop = document.getElementById('story-screen').scrollHeight;
    }

    function initOriginSelection() {
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        
        for (let key in origins) {
            let btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerHTML = `⚙️ LOAD ${origins[key].name} (MECHA: ${origins[key].mecha})`;
            btn.onclick = () => confirmOrigin(key);
            box.appendChild(btn);
        }
    }

    function confirmOrigin(key) {
        player.origin = origins[key];
        player.mecha = origins[key].mecha;
        player.cash = origins[key].cash;
        
        let pilotName = prompt("請登入您的鐵馭代號 (Pilot Name):", "Raven");
        if (!pilotName || pilotName.trim() === "") pilotName = "Pilot_No_Name";
        player.name = pilotName;

        document.getElementById('status-panel').style.display = "grid";
        document.getElementById('p-name').innerText = player.name;
        document.getElementById('p-mecha').innerText = player.mecha;
        document.getElementById('p-cash').innerText = player.cash;
        document.getElementById('p-ammo').innerText = player.ammo;
        document.getElementById('p-energy').innerText = player.energy;
        document.getElementById('p-rep').innerText = player.rep;

        showLobby();
    }

    function showLobby() {
        player.step = "lobby";
        writeStory(`>>> 【駕駛登錄完成】
鐵馭：${player.name}
機體：${player.mecha}
資產：${player.cash} Credits
特徵描述：${player.origin.desc}

你站在鋼鐵契約公會大廳的中型終端機前。終端螢幕上刷新了三個最新的見習合約（任務）：`);

        const box = document.getElementById('options-box');
        box.innerHTML = `
            <button class="option-btn" onclick="startMission(1)">📄 [任務一] 遺蹟護衛 - 推薦輕/中型 (風險: 低 | 報酬: 2500)</button>
            <button class="option-btn" onclick="startMission(2)">📄 [任務二] 鏽蝕礦道清理 - 推薦中/重型 (風險: 中 | 報酬: 4500)</button>
            <button class="option-btn" onclick="startMission(3)">📄 [任務三] 東方聯邦偵察網干擾 - 限輕型 (風險: 低 | 報酬: 3000)</button>
            <button class="option-btn" onclick="goGarage()">🛠️ 前往整備聖殿 (維修與調整武裝)</button>
        `;
    }

    function startMission(mId) {
        if (mId === 1) {
            writeStory(`>>> 【任務啟動：遺蹟護衛】
你駕駛著【${player.mecha}】護送一支泛亞重工的考古小組深入「中央蝕痕」的舊城區。
雷達突然發出警報！兩台自由旅團的輕型掠奪者機甲「街犬型」從瓦礫堆中衝了出來！`);
            
            const box = document.getElementById('options-box');
            box.innerHTML = `
                <button class="option-btn" onclick="combatOutcome(true, 2500, 1)">💥 動用主武器正面迎擊 (進行火控判定)</button>
                <button class="option-btn" onclick="combatOutcome(false, 0, 1)">💨 啟動推進器進行側向拉扯 (進行速度規避)</button>
            `;
        } else if (mId === 2) {
            writeStory(`>>> 【任務啟動：鏽蝕礦道清理】
廢棄地熱礦道內「野生自動防衛砲塔」正在偏轉槍管！`);

            const box = document.getElementById('options-box');
            box.innerHTML = `
                <button class="option-btn" onclick="combatOutcome(true, 4500, 2)">🛡️ 頂著裝甲硬扛，強行貼近用近戰兵器摧毀 (裝甲判定)</button>
                <button class="option-btn" onclick="combatOutcome(false, 1500, 2)">⚠️ 釋放煙幕干擾，安全撤退 (放棄任務)</button>
            `;
        } else if (mId === 3) {
            if (player.origin.name.includes("聯邦A")) {
                alert("因【天梯退學生】背景人脈限制，你無法對聯邦偵察網下手！");
                return;
            }
            writeStory(`>>> 【任務啟動：偵察網干擾】
你潛入聯邦邊境，試圖破壞辰曜系統部署的干擾信標。`);

            const box = document.getElementById('options-box');
            box.innerHTML = `
                <button class="option-btn" onclick="combatOutcome(true, 3000, 3)">📡 啟動電子反制套件，強行黑入信標 (索敵與電子戰)</button>
                <button class="option-btn" onclick="combatOutcome(false, 0, 3)">💨 憑藉速度在巡洋艦掃描間隙快速穿插 (極限速度)</button>
            `;
        }
    }

    function combatOutcome(isAggressive, reward, mId) {
        let success = Math.random() > 0.35;
        if (success) {
            player.cash += reward;
            document.getElementById('p-cash').innerText = player.cash;
            writeStory(`>>> 【戰術勝利】
目標被成功壓制，你順利完成了這項契約任務。

獲得報酬：+${reward} Credits！獲得公會信譽評分。`);
        } else {
            let penalty = Math.floor(reward * 0.3);
            player.cash = Math.max(0, player.cash - penalty);
            document.getElementById('p-cash').innerText = player.cash;
            writeStory(`>>> 【戰術失誤 / 撤退確認】
戰場環境極其惡劣！機體受創，任務失敗。
你支付了維修費用：-${penalty} Credits。`);
        }

        const box = document.getElementById('options-box');
        box.innerHTML = `<button class="option-btn" onclick="showLobby()">🔄 返回公會大廳接取新合約</button>`;
    }

    function goGarage() {
        writeStory(`>>> 【整備聖殿 (聖殿級工房)】
高大的機械吊臂正在緩緩移動，為你的【${player.mecha}】進行維護。`);

        const box = document.getElementById('options-box');
        box.innerHTML = `
            <button class="option-btn" onclick="buyService('repair', 1000)">🔧 全機體大保養與奈米維修 (-1000 Credits)</button>
            <button class="option-btn" onclick="buyService('ammo', 500)">🔋 彈藥與能量槽滿載重填 (-500 Credits)</button>
            <button class="option-btn" onclick="showLobby()">⬅️ 離開整備室，返回公會大廳</button>
        `;
    }

    function buyService(type, cost) {
        if (player.cash < cost) {
            alert("資金不足！");
            return;
        }
        player.cash -= cost;
        document.getElementById('p-cash').innerText = player.cash;
        if (type === 'repair') {
            writeStory(`>>> 【整備完畢】 吊臂完成校準，你的外部裝甲結構完全重組。`);
        } else {
            writeStory(`>>> 【補給完畢】 彈藥艙與反應爐已重新充能完畢。`);
        }
        goGarage();
    }

    window.onload = initOriginSelection;
</script>

</body>
</html>
