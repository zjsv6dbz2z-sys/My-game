<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機甲風暴 MUD v4.0 [戰場引擎版]</title>
    <style>
        :root {
            --neon-green: #33ff33;
            --neon-glow: rgba(51, 255, 51, 0.25);
            --dark-bg: #020502;
            --danger-red: #ff2222;
            --amber: #ffaa00;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle, #0c200c 0%, #020502 80%);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 999; background-size: 100% 3px; pointer-events: none; opacity: 0.8;
        }

        .crt-flicker { animation: crt-flicker-anim 0.15s infinite; }
        @keyframes crt-flicker-anim { 0%, 100% { opacity: 0.99; } 50% { opacity: 0.97; } }

        .game-container {
            width: 100%; max-width: 550px;
            background: rgba(5, 10, 5, 0.9);
            border: 2px solid var(--neon-green);
            box-shadow: inset 0 0 15px rgba(51, 255, 51, 0.3);
            padding: 12px; box-sizing: border-box; border-radius: 6px;
        }

        .shake { animation: shakeAnim 0.3s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 3px); }
            50% { transform: translate(4px, -3px); }
            75% { transform: translate(-3px, -2px); }
        }

        .screen-header {
            display: flex; justify-content: space-between;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 6px; margin-bottom: 10px; font-size: 11px;
        }

        .viewport {
            width: 100%; height: 120px; background-color: #010301;
            border: 1px dashed var(--neon-green); margin-bottom: 10px;
            position: relative; overflow: hidden;
        }
        
        .radar-pulse {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px solid var(--neon-green); border-radius: 50%;
            width: 10px; height: 10px; animation: pulse-anim 3s infinite linear; pointer-events: none;
        }
        .pulse-2 { animation-delay: 1.5s; }
        @keyframes pulse-anim { 0% { width: 0; height: 0; opacity: 0.8; } 100% { width: 200px; height: 200px; opacity: 0; } }

        .status-block {
            font-size: 10px; background: rgba(0,0,0,0.5);
            border: 1px dashed rgba(51, 255, 51, 0.4);
            padding: 8px; margin-bottom: 10px; line-height: 1.4;
        }
        .status-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(51, 255, 51, 0.15); padding: 3px 0; }

        .story-screen {
            height: 240px; background: #010201; border: 1px solid rgba(51,255,51,0.4);
            padding: 10px; overflow-y: auto; font-size: 11px; line-height: 1.6; margin-bottom: 10px;
        }
        .option-container { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .option-btn {
            background: #020502; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 9px; font-family: inherit; font-size: 11px; text-align: left; cursor: pointer;
        }
        .option-btn:hover { background: var(--neon-green); color: #000; }
        .blink { animation: blinkAnim 1.8s infinite; }
        @keyframes blinkAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="crt-flicker">

<div class="game-container" id="terminal-body">
    <div class="screen-header">
        <span>[HEPHAESTUS BATTLEFIELD ENGINE v4.0]</span>
        <span class="blink" style="color: var(--amber);">● TACTICAL LINK ACTIVE</span>
    </div>

    <div class="viewport">
        <div class="radar-pulse"></div><div class="radar-pulse pulse-2"></div>
        <div style="position: absolute; top: 8px; left: 8px; font-size: 9px;" id="radar-loc">LOC: 掃描中...</div>
    </div>

    <div class="status-block" id="status-block" style="display: none;">
        <div class="status-row"><span>[PILOT]: <span id="sb-pilot">--</span></span><span>[MECHA]: <span id="sb-mecha">--</span></span></div>
        <div class="status-row"><span>[位置]: <span id="sb-loc" style="color:var(--amber);">錨點站</span></span><span>[氣候]: <span id="sb-env">穩定</span></span></div>
        <div class="status-row"><span>[ Credits ]: <span id="sb-cash">0</span></span><span>[聲望]: <span id="sb-rep">10</span></span></div>
    </div>

    <div class="story-screen" id="story-screen">
        <div id="story-content">>>> [BATTLEFIELD DB LOADED]
正在載入赫菲斯托斯鏽蝕大陸地形矩陣...
請先登入鐵馭作戰設定。</div>
    </div>

    <div class="option-container" id="options-box"></div>
</div>

<script>
    // 【純文字 JSON 區塊：核心戰場資料庫】
    const battlefieldsDB = {
        "BF_04": {
            name: "風蝕刀鋒峽谷 (風之墓)",
            region: "中央蝕痕北段",
            desc: "兩側岩壁刀片狀高600公尺，風速常年80公里。陣風來襲時，輕型機不開推進會被直接吹走。地面共振碎石，腳步聲放大十倍。",
            rules: "【微量加成】：攻方攻擊微升(俯擊重力)。守方防禦微降(無掩體)。雙方速度微降(強風)。索敵改震動聲學，光學微降。",
            hazard: "強風干擾"
        },
        "BF_09": {
            name: "硫磺鹽沼觀測站 (白盲地)",
            region: "中央蝕痕南段",
            desc: "鹽殼厚2公尺可承重重型，但下方是硫磺泥漿。鹽面反光90%，白天光學全白，熱成像在白天高溫下完全失效。全赫菲斯托斯最考驗索敵的地形。",
            rules: "【微量加成】：雙方光學索敵大幅微降。熱成像失效。守方情報微升(高塔)，防禦微降(鹽磚脆)。攻方攻擊微升(利用反光致盲)。",
            hazard: "極端高溫/致盲"
        },
        "BF_11": {
            name: "血砧隘口 (唯一北上之路)",
            region: "中央蝕痕西南",
            desc: "寬僅400公尺底部硬化河床，兩側垂直岩壁全是舊鑿射擊孔與滾石陷阱。是重型機進帝國腹地的唯一通道，擁擠且無退路。",
            rules: "【微量加成】：守方防禦攻擊大幅微升(隘口預設射界)。攻方速度大幅微降(擁擠/拒馬)。雙方索敵微降(岩壁遮蔽)。",
            hazard: "極度擁擠/無退路"
        }
    };

    const origins = {
        "FA": { name: "聯邦A：天梯退學生", mecha: "隼訓練型", cash: 12000, desc: "速度+15%、裝甲-10%。沙塵故障率+10%。" },
        "DA": { name: "帝國A：礦坑之子", mecha: "蠍尾礦山型", cash: 5000, desc: "裝甲+15%、速度-10%。礦工之肺免疫沙暴氣候。" },
        "NA": { name: "中立A：拾荒兒", mecha: "街犬型", cash: 4000, desc: "索敵+10%、速度+5%、火力-10%。情報+25%。" }
    };

    let player = { name: "", origin: null, mecha: "", cash: 0, rep: 10, loc: "錨點站" };

    function writeStory(text, append=false) {
        const sc = document.getElementById('story-content');
        sc.innerHTML = append ? sc.innerHTML + "\n\n" + text : text;
        document.getElementById('story-screen').scrollTop = document.getElementById('story-screen').scrollHeight;
    }

    function init() {
        const box = document.getElementById('options-box'); box.innerHTML = "";
        for (let key in origins) {
            let btn = document.createElement('button'); btn.className = "option-btn";
            btn.innerHTML = `⚙️ LOAD ${origins[key].name} (${origins[key].mecha})`;
            btn.onclick = () => confirmOrigin(key); box.appendChild(btn);
        }
    }

    function confirmOrigin(key) {
        player.origin = origins[key]; player.mecha = origins[key].mecha; player.cash = origins[key].cash;
        player.name = prompt("輸入鐵馭代號:", "Raven") || "Unknown";
        document.getElementById('status-block').style.display = "block";
        updateUI(); showLobby();
    }

    function updateUI(env = "穩定") {
        document.getElementById('sb-pilot').innerText = player.name;
        document.getElementById('sb-mecha').innerText = player.mecha;
        document.getElementById('sb-loc').innerText = player.loc;
        document.getElementById('sb-env').innerText = env;
        document.getElementById('sb-cash').innerText = player.cash;
        document.getElementById('sb-rep').innerText = player.rep;
        document.getElementById('radar-loc').innerText = `LOC: ${player.loc}`;
    }

    function showLobby() {
        player.loc = "錨點站"; updateUI();
        writeStory(`>>> 【公會終端連線】\n目前位置：${player.loc}\n系統已根據最新戰場數據生成見習合約，請選擇部署地點：`);
        
        const box = document.getElementById('options-box');
        box.innerHTML = `
            <button class="option-btn" onclick="deploy('BF_04')">📍 [部署] 04號戰場：風蝕刀鋒峽谷 (伏擊/反伏擊)</button>
            <button class="option-btn" onclick="deploy('BF_09')">📍 [部署] 09號戰場：硫磺鹽沼觀測站 (狙擊/反盲)</button>
            <button class="option-btn" onclick="deploy('BF_11')">📍 [部署] 11號戰場：血砧隘口 (陣地絞肉機)</button>
            <button class="option-btn" style="color:var(--amber);" onclick="location.reload()">🔄 重啟終端 (換機體)</button>
        `;
    }

    function deploy(bfId) {
        const bf = battlefieldsDB[bfId];
        player.loc = bf.name; updateUI(bf.hazard);
        
        writeStory(`>>> 【戰場空投確認】\n抵達座標：${bf.region}\n\n[地形觀測報告]：\n${bf.desc}\n\n[環境克制規則]：\n${bf.rules}\n\n雷達探測到敵方武裝機甲逼近！`);

        const isHeavy = player.mecha.includes("蠍尾"); // 簡單判斷裝甲優勢
        const isFast = player.mecha.includes("隼"); // 簡單判斷速度優勢

        const box = document.getElementById('options-box');
        box.innerHTML = `
            <button class="option-btn" onclick="combat(true, ${isHeavy})">💥 正面強攻 (依賴裝甲與火力判定)</button>
            <button class="option-btn" onclick="combat(false, ${isFast})">💨 利用地形機動拉扯 (依賴速度判定)</button>
            <button class="option-btn" onclick="showLobby()">⚠️ 取消合約，撤退回錨點站</button>
        `;
    }

    function combat(isAggressive, hasAdvantage) {
        // 模擬 R表 雙骰邏輯 (有優勢取高，否則標準)
        let roll1 = Math.floor(Math.random() * 20);
        let roll2 = Math.floor(Math.random() * 20);
        let finalRoll = hasAdvantage ? Math.max(roll1, roll2) : roll1;
        let success = finalRoll >= 10;

        document.getElementById('terminal-body').classList.add('shake');
        setTimeout(() => document.getElementById('terminal-body').classList.remove('shake'), 300);

        let rpt = `>>> 【戰術判定】\n環境檢定骰出: [${roll1}] ${hasAdvantage ? `及 [${roll2}] (優勢取高)` : ''} -> 最終值: ${finalRoll}\n\n`;

        if (success) {
            player.cash += 3500; player.rep += 5;
            rpt += `你完美利用了地形優勢！敵機在複雜的物理環境中失去平衡，被你精準擊毀核心。\n獲得報酬: +3500 Credits`;
        } else {
            let penalty = 1200; player.cash = Math.max(0, player.cash - penalty);
            rpt += `戰場環境極度險惡！你的機體受到極端氣候與地形限制，裝甲嚴重受損，被迫啟動緊急脫離。\n維修費: -${penalty} Credits`;
        }

        writeStory(rpt); updateUI();
        document.getElementById('options-box').innerHTML = `<button class="option-btn" onclick="showLobby()">🔄 返回公會大廳</button>`;
    }

    window.onload = init;
</script>
</body>
</html>
